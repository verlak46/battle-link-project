<ion-header>
  <ion-toolbar>
    <ion-title>Mapa</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <google-map
    [center]="center()"
    [zoom]="zoom()"
    [options]="mapOptions"
    width="100%"
    height="100%">

    @for (venue of venues(); track venue._id) {
      <map-marker
        #marker="mapMarker"
        [position]="markerPosition(venue)"
        [title]="venue.name"
        (mapClick)="openInfo(marker, venue)">
      </map-marker>
    }

    <map-info-window>
      @if (selectedVenue()) {
        <div class="info-window">
          <h3>{{ selectedVenue()!.name }}</h3>
          <p class="type">{{ selectedVenue()!.type === 'store' ? 'Tienda' : 'Club' }}</p>
          <p>{{ selectedVenue()!.address }}</p>
          <p>{{ selectedVenue()!.city }}</p>
        </div>
      }
    </map-info-window>

  </google-map>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button routerLink="/venues/nueva">
      <ion-icon name="add-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
