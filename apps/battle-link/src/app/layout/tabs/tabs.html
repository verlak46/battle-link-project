<ion-tabs>
  <ion-tab-bar slot="bottom">

    <ion-tab-button tab="home">
      <ion-icon name="home-outline"></ion-icon>
      <ion-label>{{ 'NAV.HOME' | translate }}</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="explore">
      <ion-icon name="compass-outline"></ion-icon>
      <ion-label>{{ 'NAV.EXPLORE' | translate }}</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="new" class="tab-nuevo">
      <ion-icon name="add-circle" class="tab-nuevo-icon"></ion-icon>
    </ion-tab-button>

    <ion-tab-button tab="chat">
      <ion-icon name="chatbubbles-outline"></ion-icon>
      <ion-label>{{ 'NAV.CHAT' | translate }}</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="profile">
      <ion-icon name="person-outline"></ion-icon>
      <ion-label>{{ 'NAV.PROFILE' | translate }}</ion-label>
    </ion-tab-button>

  </ion-tab-bar>
</ion-tabs>
