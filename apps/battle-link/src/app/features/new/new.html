<ion-header>
  <ion-toolbar>
    <ion-title>{{ tipo() === 'partida' ? 'Nueva Partida' : 'Nuevo Evento' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <app-type-selector
    [tipo]="tipo()"
    (tipoChange)="tipo.set($event)">
  </app-type-selector>

  <div class="stepper">
    @for (paso of pasos; track paso.id) {

      <app-step-header
        [paso]="paso"
        [total]="pasos.length"
        [active]="pasoActual() === paso.id"
        [done]="pasoActual() > paso.id"
        (clicked)="irAPaso($event)">
      </app-step-header>

      @if (pasoActual() === paso.id) {
        <div class="step__body">

          @if (paso.id === 1) {
            <app-step-game
              [tipo]="tipo()"
              [juego]="form().juego"
              [sistema]="form().sistema"
              (juegoChange)="patch({ juego: $event })"
              (sistemaChange)="patch({ sistema: $event })">
            </app-step-game>
          }

          @if (paso.id === 2) {
            <app-step-date
              [fecha]="form().fecha"
              [hora]="form().hora"
              (fechaChange)="patch({ fecha: $event })"
              (horaChange)="patch({ hora: $event })">
            </app-step-date>
          }

          @if (paso.id === 3) {
            <app-step-location
              [ciudad]="form().ciudad"
              [direccion]="form().direccion"
              [placeId]="form().placeId ?? null"
              [places]="places()"
              (ciudadChange)="patch({ ciudad: $event })"
              (direccionChange)="patch({ direccion: $event })"
              (placeIdChange)="patch({ placeId: $event ?? undefined })">
            </app-step-location>
          }

          @if (paso.id === 4) {
            <app-step-details
              [tipo]="tipo()"
              [titulo]="form().titulo"
              [descripcion]="form().descripcion"
              [maxJugadores]="form().maxJugadores"
              [imageUrl]="form().imageUrl"
              (tituloChange)="patch({ titulo: $event })"
              (descripcionChange)="patch({ descripcion: $event })"
              (maxJugadoresChange)="patch({ maxJugadores: $event })"
              (imageUrlChange)="patch({ imageUrl: $event })">
            </app-step-details>
          }

          <app-step-nav
            [tipo]="tipo()"
            [valido]="esPasoValido()"
            [esUltimoPaso]="esUltimoPaso()"
            [mostrarAnterior]="pasoActual() > 1"
            (anterior)="anterior()"
            (siguiente)="siguiente()"
            (confirmar)="confirmar()">
          </app-step-nav>

        </div>
      }

    }
  </div>

</ion-content>
