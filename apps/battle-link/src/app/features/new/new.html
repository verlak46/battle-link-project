<ion-header>
  <ion-toolbar>
    <ion-title>{{ type() === 'partida' ? 'Nueva Partida' : 'Nuevo Evento' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <app-type-selector
    [type]="type()"
    (typeChange)="type.set($event)">
  </app-type-selector>

  <div class="stepper">
    @for (step of steps; track step.id) {

      <app-step-header
        [step]="step"
        [total]="steps.length"
        [active]="currentStep() === step.id"
        [done]="currentStep() > step.id"
        (clicked)="goToStep($event)">
      </app-step-header>

      @if (currentStep() === step.id) {
        <div class="step__body">

          @if (step.id === 1) {
            <app-step-game
              [type]="type()"
              [game]="form().game"
              [system]="form().system"
              (gameChange)="patch({ game: $event })"
              (systemChange)="patch({ system: $event })">
            </app-step-game>
          }

          @if (step.id === 2) {
            <app-step-date
              [date]="form().date"
              [time]="form().time"
              (dateChange)="patch({ date: $event })"
              (timeChange)="patch({ time: $event })">
            </app-step-date>
          }

          @if (step.id === 3) {
            <app-step-location
              [city]="form().city"
              [address]="form().address"
              [placeId]="form().placeId ?? null"
              [placeName]="form().placeName ?? ''"
              [places]="places()"
              (cityChange)="patch({ city: $event })"
              (addressChange)="patch({ address: $event })"
              (placeIdChange)="patch({ placeId: $event ?? undefined })"
              (placeNameChange)="patch({ placeName: $event || undefined })">
            </app-step-location>
          }

          @if (step.id === 4) {
            <app-step-details
              [type]="type()"
              [title]="form().title"
              [description]="form().description"
              [maxPlayers]="form().maxPlayers"
              [imageUrl]="form().imageUrl"
              (titleChange)="patch({ title: $event })"
              (descriptionChange)="patch({ description: $event })"
              (maxPlayersChange)="patch({ maxPlayers: $event })"
              (imageUrlChange)="patch({ imageUrl: $event })">
            </app-step-details>
          }

          <app-step-nav
            [type]="type()"
            [valid]="isStepValid()"
            [isLastStep]="isLastStep()"
            [showPrevious]="currentStep() > 1"
            (previous)="previous()"
            (next)="next()"
            (confirm)="confirm()">
          </app-step-nav>

        </div>
      }

    }
  </div>

</ion-content>
