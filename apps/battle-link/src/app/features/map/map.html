<ion-header>
  <ion-toolbar>
    <ion-title>Mapa</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <google-map
    [center]="center()"
    [zoom]="zoom()"
    [options]="mapOptions"
    width="100%"
    height="100%">

    @for (place of places(); track place._id) {
      <map-marker
        #marker="mapMarker"
        [position]="markerPosition(place)"
        [title]="place.name"
        (mapClick)="openInfo(marker, place)">
      </map-marker>
    }

    <map-info-window>
      @if (selectedPlace()) {
        <div class="info-window">
          <h3>{{ selectedPlace()!.name }}</h3>
          <p class="type">{{ selectedPlace()!.type === 'store' ? 'Tienda' : 'Club' }}</p>
          <p>{{ selectedPlace()!.address }}</p>
          <p>{{ selectedPlace()!.city }}</p>
        </div>
      }
    </map-info-window>

  </google-map>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button routerLink="/places/nueva">
      <ion-icon name="add-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
