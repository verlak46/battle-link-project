<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/mapa"></ion-back-button>
    </ion-buttons>
    <ion-title>Nueva tienda / club</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-segment [value]="type()" (ionChange)="type.set($any($event).detail.value)">
    <ion-segment-button value="store">Tienda</ion-segment-button>
    <ion-segment-button value="club">Club</ion-segment-button>
  </ion-segment>

  <ion-item>
    <ion-label position="stacked">Nombre *</ion-label>
    <ion-input
      [value]="name()"
      (ionInput)="name.set($any($event).detail.value)"
      placeholder="Nombre de la tienda o club">
    </ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Dirección *</ion-label>
    <ion-input
      #addressInput
      [value]="address()"
      (ionInput)="address.set($any($event).detail.value)"
      placeholder="Ej. Calle Mayor 12"
      autocomplete="off">
    </ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Ciudad *</ion-label>
    <ion-input
      [value]="city()"
      (ionInput)="city.set($any($event).detail.value)"
      placeholder="Ej. Madrid">
    </ion-input>
  </ion-item>

  @if (mapCenter(); as center) {
    <div class="map-preview">
      <google-map
        [center]="center"
        [zoom]="16"
        [options]="mapOptions"
        width="100%"
        height="100%">
        <map-marker [position]="center"></map-marker>
      </google-map>
    </div>
  } @else {
    <div class="map-placeholder">
      <p>Selecciona una dirección para ver la ubicación</p>
    </div>
  }

  <ion-item>
    <ion-label position="stacked">Descripción</ion-label>
    <ion-textarea
      [value]="description()"
      (ionInput)="description.set($any($event).detail.value)"
      placeholder="Breve descripción del local"
      rows="3">
    </ion-textarea>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Teléfono</ion-label>
    <ion-input
      [value]="phone()"
      (ionInput)="phone.set($any($event).detail.value)"
      type="tel"
      placeholder="Ej. +34 912 345 678">
    </ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Web</ion-label>
    <ion-input
      [value]="website()"
      (ionInput)="website.set($any($event).detail.value)"
      type="url"
      placeholder="https://...">
    </ion-input>
  </ion-item>

  <app-image-upload
    entityType="places"
    [imageUrl]="imageUrl()"
    (imageUrlChange)="imageUrl.set($event)"
    (uploadError)="error.set($event)">
  </app-image-upload>

  @if (error()) {
    <p class="error-msg">{{ error() }}</p>
  }

  <ion-button
    expand="block"
    class="submit-btn"
    (click)="submit()"
    [disabled]="loading()">
    @if (loading()) {
      <ion-spinner name="crescent" slot="start"></ion-spinner>
      Enviando...
    } @else {
      Enviar solicitud
    }
  </ion-button>

  <ion-toast
    [isOpen]="success()"
    message="Solicitud enviada — pendiente de aprobación"
    duration="2000"
    position="bottom"
    color="success">
  </ion-toast>

</ion-content>
